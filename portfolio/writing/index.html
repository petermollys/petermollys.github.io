---
layout: default
title: "writing"
---
<link rel="stylesheet" href="/css/portfolio.css">

<h1>{{ page.title }}</h1>
<p><a href="/portfolio/">&larr; Back</a></p>

<ul class="posts">
  {% assign items = site.works | where: "type", "writing" %}
  {% for work in items %}
    <li><a href="{{ work.image }}" title="{{ work.title }}">{{ work.title }}</a></li>
  {% endfor %}
</ul>
