---
layout: default
title: "writing"
---
<link rel="stylesheet" href="/css/portfolio.css">

<h1>{{ page.title }}</h1>
<p><a href="/portfolio/">&larr; Back</a></p>

<div class="work-grid">
  {% assign items = site.works | where: "type", "writing" %}
  {% for work in items %}
    <div class="work">
      <img src="{{ work.image }}" alt="{{ work.title }}">
      <h2>{{ work.title }}</h2>
      <p class="meta">
        {{ work.medium }}{% if work.year %}, {{ work.year }}{% endif %}
      </p>
      <div class="description">{{ work.content }}</div>
    </div>
  {% endfor %}
</div>
