---
layout: default
title: "My portfolio"
---
<style>
  .work-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 2rem;
    margin-top: 1.5rem;
  }
  .work img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }
  .work h2 {
    margin: 0.5rem 0 0.2rem;
    font-size: 1.1rem;
  }
  .work .meta {
    font-size: 0.9rem;
    color: #666;
    margin: 0 0 0.5rem;
  }
</style>

<div class="work-grid">
  {% for work in site.works %}
    <div class="work">
      <img src="{{ work.image }}" alt="{{ work.title }}">
      <h2>{{ work.title }}</h2>
      <p class="meta">
        {{ work.medium }}{% if work.year %}, {{ work.year }}{% endif %}
      </p>
      <div>{{ work.content }}</div>
    </div>
  {% endfor %}
</div>
